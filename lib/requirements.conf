# ============================================================================
#  NetBox Enterprise — Requirements (SINGLE SOURCE OF TRUTH)
# ============================================================================
#  Every threshold, port, module, endpoint and supported-version below is
#  derived from the official NetBox Labs documentation. When the docs change,
#  edit THIS FILE ONLY — the rest of the tool reads from these variables.
#
#  Sources:
#    https://netboxlabs.com/docs/enterprise/embedded-cluster/nbe-ec-requirements/
#    https://netboxlabs.com/docs/enterprise/embedded-cluster/nbe-ec-requirements-rhel/
#    https://netboxlabs.com/docs/enterprise/embedded-cluster/nbe-ec-requirements-ubuntu/
#    https://netboxlabs.com/docs/enterprise/embedded-cluster/nbe-ec-installation/
#
#  This file is sourced by bash; keep it valid shell (KEY=value / arrays).
# ============================================================================

# ---- Tool metadata ---------------------------------------------------------
NBE_TOOL_VERSION="1.0.0"

# ----------------------------------------------------------------------------
# Hardware tiers
#   Non-production MINIMUM  : 4 vCPU / 16 GB RAM / 50 GB disk
#   Production RECOMMENDED  : 8 vCPU / 24 GB RAM / 100 GB disk
#   Verdict is tiered: below MIN = FAIL, MIN..REC = WARN, >= REC = OK
# ----------------------------------------------------------------------------
MIN_VCPU=4
MIN_RAM_GB=16
MIN_DISK_GB=50

REC_VCPU=8
REC_RAM_GB=24
REC_DISK_GB=100

# Path whose free space must satisfy the disk requirement
DISK_PATH="/var/lib"

# Required CPU architecture (uname -m)
REQUIRED_ARCH="x86_64"

# Minimum Linux kernel version
MIN_KERNEL="4.3"

# ----------------------------------------------------------------------------
# Kernel modules that must be loaded and persisted
# ----------------------------------------------------------------------------
KERNEL_MODULES=(br_netfilter ip_vs ip_vs_rr ip_vs_wrr ip_vs_sh overlay)
MODULES_LOAD_FILE="/etc/modules-load.d/kubernetes.conf"

# ----------------------------------------------------------------------------
# sysctl parameters (key=expected_value)
# ----------------------------------------------------------------------------
SYSCTL_PARAMS=(
    "net.bridge.bridge-nf-call-iptables=1"
    "net.bridge.bridge-nf-call-ip6tables=1"
    "net.ipv4.ip_forward=1"
)
SYSCTL_CONF_FILE="/etc/sysctl.d/99-kubernetes.conf"

# ----------------------------------------------------------------------------
# Network ports
#   TCP_PORTS         : individual inbound TCP ports needed on every host
#   TCP_PORT_RANGES   : inbound TCP port ranges (start:end)
#   UDP_PORTS         : inbound UDP ports
#   FIREWALLD_EXTRA   : extra ports RHEL/firewalld documentation calls out
#   PORTS_MUST_BE_FREE: ports that must NOT already be in use before install
# ----------------------------------------------------------------------------
# NOTE: 22 (SSH) is included so enabling a firewall never locks out remote access.
TCP_PORTS=(22 80 443 6443 5473 10250 10251 10252 10255 10257 10259 179)
TCP_PORT_RANGES=("2379:2380" "30000:32767")
UDP_PORTS=(4789)
# Extra ports the RHEL/firewalld docs call out (22 already covered above).
FIREWALLD_EXTRA_PORTS=(7443 9091 9443 10249 10256)
PORTS_MUST_BE_FREE=(80 443 30000)
SSH_PORT=22

ADMIN_CONSOLE_PORT=30000

# ----------------------------------------------------------------------------
# Pod networking (Calico) — required cross-routing
# ----------------------------------------------------------------------------
POD_CIDR_A="10.244.0.0/17"
POD_CIDR_B="10.244.128.0/17"

# ----------------------------------------------------------------------------
# Outbound endpoints that must be reachable (TCP 443)
# ----------------------------------------------------------------------------
NETBOX_ENDPOINTS=(
    "app.enterprise.netboxlabs.com"
    "registry.enterprise.netboxlabs.com"
    "proxy.enterprise.netboxlabs.com"
    "replicated.app"
)

# ----------------------------------------------------------------------------
# Installer
# ----------------------------------------------------------------------------
INSTALLER_URL="https://app.enterprise.netboxlabs.com/embedded/netbox-enterprise/stable-v2"
INSTALLER_TARBALL="netbox-enterprise-stable-v2.tgz"
INSTALL_BIN_NAME="netbox-enterprise"

# ----------------------------------------------------------------------------
# Supported distribution versions (space-separated VERSION_ID values).
# Unknown versions WARN (never hard-fail) so newer releases still run.
# ----------------------------------------------------------------------------
SUPPORTED_UBUNTU="24.04 22.04 20.04"
SUPPORTED_DEBIAN="12 11"
SUPPORTED_RHEL="9.5 9.0 8.10 7.9"
SUPPORTED_ROCKY="9.5 8.10"
SUPPORTED_ALMA="9.5 8.10"
SUPPORTED_ORACLE="9.3 8.9"
SUPPORTED_CENTOS="10 9"
SUPPORTED_AMAZON="2023"
SUPPORTED_FEDORA="41"
SUPPORTED_SUSE="15.6"
